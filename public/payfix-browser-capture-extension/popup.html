<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PayFix Page Capture</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        width: 320px;
        margin: 0;
        background: #0f172a;
        color: #e5edf8;
      }

      main {
        padding: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 15px;
        line-height: 1.3;
      }

      p {
        margin: 0 0 12px;
        color: #9fb0c7;
        font-size: 12px;
        line-height: 1.45;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: #0ea5e9;
        color: white;
        cursor: pointer;
        font-weight: 800;
        padding: 10px 12px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      #status {
        margin-top: 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        color: #cbd5e1;
        font-size: 12px;
        line-height: 1.45;
        min-height: 18px;
        padding: 9px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Share this page with PayFix</h1>
      <p>
        Captures visible text, links, title, URL, and selected text from this tab. Use only on pages you intentionally
        want PayFix to inspect.
      </p>
      <button id="capture">Share visible page</button>
      <div id="status">Ready.</div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
